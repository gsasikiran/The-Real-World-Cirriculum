<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Track | The Real World Cirricullum</title>
    <meta
      name="description"
      content="Practical topic page with levels, concepts, terminology, references, and quiz."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-topic="health-first-aid">
    <a class="skip-link" href="#topic-modules">Skip to content</a>
    <div class="progress-bar" id="progress-bar" aria-hidden="true"></div>
    <button class="back-to-top" id="back-to-top" aria-label="Back to top" title="Back to top">&#8593;</button>
    <header class="hero hero-compact">
      <nav class="top-nav">
        <a class="brand" href="../index.html">The Real World Cirricullum</a>
        <a href="../index.html#topics" class="nav-link">All Topics</a>
      </nav>
      <div class="hero-content" id="topic-header"></div>
    </header>

    <main>
      <section class="section" id="topic-modules"></section>
      <section class="section" id="topic-levels"></section>
      <section class="section" id="topic-language"></section>
      <section class="section" id="topic-references"></section>
      <section class="section" id="topic-support"></section>
      <section class="section" id="topic-quiz"></section>
      <section class="section">
        <div class="note note-action" id="first-action"></div>
        <div class="note note-warning" id="warning-note"></div>
      </section>
    </main>

    <footer>
      <p>Build one practical skill every week.</p>
      <p class="ai-note">Written with AI on April 12, 2026.</p>
    </footer>

    <script src="../topics-data.js"></script>
    <script src="../topic.js"></script>
    <script>
      const nav = document.querySelector(".top-nav");
      const progressBar = document.getElementById("progress-bar");
      const backBtn = document.getElementById("back-to-top");
      window.addEventListener("scroll", () => {
        const scrollY = window.scrollY;
        nav.classList.toggle("scrolled", scrollY > 20);
        const docH = document.documentElement.scrollHeight - window.innerHeight;
        progressBar.style.width = docH > 0 ? (scrollY / docH * 100) + "%" : "0%";
        backBtn.classList.toggle("visible", scrollY > 400);
      }, { passive: true });
      backBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    </script>
  </body>
</html>
