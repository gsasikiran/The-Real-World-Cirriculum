<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mental health icon">
  <defs>
    <linearGradient id="mhbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe7c7" />
      <stop offset="100%" stop-color="#d8f2ea" />
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#mhbg)" stroke="#1f7a6b" stroke-width="4" />
  <!-- Full solid heart -->
  <path d="M64 102 C38 86 20 70 20 50 C20 37 30 28 42 28 C52 28 58 34 64 42 C70 34 76 28 86 28 C98 28 108 37 108 50 C108 70 90 86 64 102Z" fill="#ff6b2d" />
  <!-- Brain left lobe fold -->
  <path d="M40 52 C40 44 46 38 52 38 C52 44 50 50 44 54" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Brain right lobe fold -->
  <path d="M88 52 C88 44 82 38 76 38 C76 44 78 50 84 54" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Brain center divide -->
  <line x1="64" y1="34" x2="64" y2="62" stroke="#fff" stroke-width="3" stroke-linecap="round" />
  <!-- Lower left fold -->
  <path d="M42 62 C46 68 52 66 54 62" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" />
  <!-- Lower right fold -->
  <path d="M86 62 C82 68 76 66 74 62" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" />
</svg>
